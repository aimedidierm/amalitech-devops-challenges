name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kora-analytics-api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js to match the version used in the Docker image
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # Install dependencies inside the app directory
      - name: Install dependencies
        run: npm ci
        working-directory: app

      # Run the test suite — pipeline stops here if any test fails
      - name: Run tests
        run: npm test
        working-directory: app

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the auto-generated GITHUB_TOKEN
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags: one with the short commit SHA, one as latest
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # Build the Docker image and push it to GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Check out the repository to get the docker-compose file
      - name: Checkout code
        uses: actions/checkout@v4

      # SSH into the EC2 instance, pull the new image, and restart the container
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Log in to GHCR from the EC2 instance
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the latest image built from this commit
            docker pull ghcr.io/${{ github.repository_owner }}/kora-analytics-api:latest

            # Stop and remove the old container if it exists
            docker stop kora-api || true
            docker rm kora-api || true

            # Start the new container, mapping host port 80 to container port 3000
            docker run -d \
              --name kora-api \
              --restart unless-stopped \
              -p 80:3000 \
              -e PORT=3000 \
              ghcr.io/${{ github.repository_owner }}/kora-analytics-api:latest

            # Verify the container started and the health endpoint responds
            sleep 5
            curl -f http://localhost/health || exit 1
